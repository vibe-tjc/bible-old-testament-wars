<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>舊約著名戰爭流程與重要事件</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --muted: #94a3b8;
      --text: #f8fafc;
      --gold: #fbbf24;
      --blue: #38bdf8;
      --green: #34d399;
      --red: #fb7185;
      --border: rgba(255,255,255,.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(251,191,36,.16), transparent 35%),
        var(--bg);
      min-height: 100vh;
    }
    header {
      padding: 44px 22px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: clamp(1.9rem, 5vw, 3.4rem); letter-spacing: .04em; }
    .subtitle { color: var(--muted); margin: 14px auto 0; max-width: 820px; line-height: 1.7; }
    main { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      margin: 10px 0 22px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15,23,42,.86);
      backdrop-filter: blur(10px);
      padding: 12px 0;
    }
    input, select, button {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(17,24,39,.9);
      color: var(--text);
      font: inherit;
    }
    button { cursor: pointer; transition: .2s; }
    button:hover, .war-card:hover { border-color: rgba(251,191,36,.65); transform: translateY(-1px); }
    .layout { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
    .war-list { display: grid; gap: 12px; }
    .war-card {
      text-align: left;
      background: rgba(31,41,55,.82);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      transition: .2s;
    }
    .war-card.active { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(251,191,36,.35); }
    .war-card h3 { margin: 0 0 8px; font-size: 1.08rem; }
    .meta { color: var(--muted); font-size: .92rem; line-height: 1.5; }
    .badge { display: inline-block; color: #111827; background: var(--gold); padding: 2px 8px; border-radius: 999px; font-size: .78rem; margin-left: 6px; }
    .detail {
      background: rgba(17,24,39,.82);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      min-height: 620px;
    }
    .detail h2 { margin: 0 0 6px; font-size: clamp(1.5rem, 3vw, 2.2rem); }
    .scripture { color: var(--gold); font-weight: 700; margin-bottom: 16px; }
    .summary { color: #dbeafe; line-height: 1.8; margin-bottom: 18px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 18px 0; }
    .info {
      background: rgba(31,41,55,.75);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    .info b { display: block; color: var(--blue); margin-bottom: 6px; }
    .flow { margin-top: 22px; }
    .flow h3, .lessons h3 { margin: 0 0 14px; }
    .steps { display: grid; gap: 12px; }
    .step {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: start;
      background: rgba(31,41,55,.68);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }
    .num {
      width: 34px; height: 34px; border-radius: 50%;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--gold), #f97316);
      color: #111827; font-weight: 900;
    }
    .step-title { font-weight: 800; margin-bottom: 4px; }
    .step-body { color: #cbd5e1; line-height: 1.65; }
    .lessons { margin-top: 22px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { border: 1px solid var(--border); border-radius: 999px; padding: 8px 11px; color: #d1fae5; background: rgba(52,211,153,.1); }
    .map {
      margin-top: 18px;
      border: 1px dashed rgba(255,255,255,.22);
      border-radius: 18px;
      padding: 14px;
      color: var(--muted);
      line-height: 1.7;
    }
    .map-panel {
      margin-top: 22px;
      background: rgba(31,41,55,.62);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
    }
    .map-panel h3 { margin: 0 0 12px; }
    .mini-map {
      width: 100%;
      height: 360px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(14,165,233,.12), rgba(251,191,36,.10));
      border: 1px solid rgba(255,255,255,.1);
      overflow: hidden;
    }
    .leaflet-container { background: #0f172a; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #111827; color: #f8fafc; }
    .map-note { color: var(--muted); font-size: .92rem; margin-top: 10px; }
    .map-label { font-size: 12px; fill: #f8fafc; font-weight: 700; paint-order: stroke; stroke: #0f172a; stroke-width: 3px; }
    .map-small { font-size: 11px; fill: #cbd5e1; paint-order: stroke; stroke: #0f172a; stroke-width: 3px; }
    .map-route { fill: none; stroke: var(--gold); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 7 6; }
    .map-dot { fill: var(--gold); stroke: #111827; stroke-width: 2; }
    .map-water { fill: rgba(56,189,248,.16); stroke: rgba(56,189,248,.45); stroke-width: 2; }
    .map-land { fill: rgba(251,191,36,.08); stroke: rgba(251,191,36,.22); stroke-width: 2; }
    footer { text-align: center; color: var(--muted); padding: 30px 18px 42px; }
    @media (max-width: 900px) {
      .toolbar { grid-template-columns: 1fr; position: static; }
      .layout { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>舊約著名戰爭流程與重要事件</h1>
    <p class="subtitle">互動式整理舊約中幾場具代表性的戰役：從背景、危機、神的介入、戰爭流程到信仰功課。無後端，純 HTML / CSS / JavaScript。</p>
  </header>

  <main>
    <section class="toolbar">
      <input id="search" type="search" placeholder="搜尋戰役、人物、地點、經文…" />
      <select id="period">
        <option value="all">全部時期</option>
        <option value="patriarchs">先祖時期</option>
        <option value="exodus">出埃及 / 曠野</option>
        <option value="conquest">征服迦南</option>
        <option value="judges">士師時期</option>
        <option value="kingdom">王國時期</option>
      </select>
      <button id="reset">重設</button>
    </section>

    <section class="layout">
      <aside class="war-list" id="warList"></aside>
      <article class="detail" id="detail"></article>
    </section>
  </main>

  <footer>經文摘要以和合本常見譯語概述；建議搭配完整聖經章節閱讀。</footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>

    const listEl = document.getElementById('warList');

    let selectedId = wars[0].id;

    function renderList() {
      const q = searchEl.value.trim().toLowerCase();
      const period = periodEl.value;
      const filtered = wars.filter(w => {
        const text = [w.title, w.ref, w.time, w.place, w.people, w.summary, ...w.lessons].join(' ').toLowerCase();

      });
      if (!filtered.find(w => w.id === selectedId) && filtered[0]) selectedId = filtered[0].id;
      listEl.innerHTML = filtered.map(w => `
        <button class="war-card ${w.id === selectedId ? 'active' : ''}" data-id="${w.id}">
          <h3>${w.title}<span class="badge">${w.time}</span></h3>
          <div class="meta">${w.ref}<br>${w.place}</div>
        </button>
      `).join('') || '<div class="meta">找不到符合條件的戰役。</div>';
      listEl.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        selectedId = btn.dataset.id;
        render();
      }));
    }

      'gideon': {
        note: '基甸在耶斯列谷一帶面對米甸聯軍，三百人夜間突襲敵營。',
        points: [['俄弗拉示意', 32.55, 35.35], ['哈律泉', 32.55, 35.35], ['米甸營示意', 32.6, 35.45], ['耶斯列谷', 32.56, 35.32]]
      },
      'deborah': {
        note: '巴拉從他泊山下擊西西拉，基順河一帶使鐵車優勢失效。',
        points: [['他泊山', 32.686, 35.390], ['基順河', 32.75, 35.08], ['夏瑣', 33.018, 35.567], ['雅億帳棚示意', 32.87, 35.45]]
      },
      'david-goliath': {
        note: '以拉谷位於猶大山地與非利士平原之間，是兩軍對峙之處。',
        points: [['伯利恆', 31.7054, 35.2024], ['以拉谷', 31.68, 34.98], ['迦特示意', 31.7, 34.85], ['耶路撒冷', 31.7683, 35.2137]]
      },
      'elisha-aram': {
        note: '亞蘭軍圍困多坍；以利沙將敵軍引到撒馬利亞。',
        points: [['多坍', 32.42, 35.24], ['撒馬利亞', 32.276, 35.197], ['亞蘭方向 / 大馬士革', 33.5138, 36.2765]]
      },
      'jerusalem-sennacherib': {
        note: '亞述軍威脅耶路撒冷；拉吉是相關軍事重鎮。',
        points: [['耶路撒冷', 31.7683, 35.2137], ['拉吉', 31.565, 34.846], ['亞述軍營示意', 31.82, 35.0], ['尼尼微方向', 36.35, 43.15]]
      }
    };

    let leafletMap;
    let leafletLayerGroup;

    function renderMap(id) {
      const m = mapData[id];
      if (!m) return '';
      return `
        <section class="map-panel">
          <h3>OpenStreetMap 地圖</h3>
          <div id="leafletMap" class="mini-map"></div>
          <div class="map-note">${m.note}</div>
        </section>`;
    }

    function updateLeafletMap(id) {
      const m = mapData[id];
      const el = document.getElementById('leafletMap');
      if (!m || !el || !window.L) return;

      // The detail panel is re-rendered for every selected event, so the old
      // map container is removed from the DOM. Recreate the Leaflet instance
      // each time to avoid Leaflet keeping a reference to the stale container.
      if (leafletMap) {
        leafletMap.remove();
        leafletMap = null;
        leafletLayerGroup = null;
      }

      leafletMap = L.map(el, { scrollWheelZoom: false });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(leafletMap);

      leafletLayerGroup = L.layerGroup().addTo(leafletMap);
      const latlngs = m.points.map(p => [p[1], p[2]]);
      m.points.forEach(([label, lat, lng]) => {
        L.marker([lat, lng]).addTo(leafletLayerGroup).bindPopup(label);
      });
      if (latlngs.length > 1) {
        L.polyline(latlngs, { color: '#fbbf24', weight: 4, dashArray: '8 8' }).addTo(leafletLayerGroup);
      }
      leafletMap.fitBounds(latlngs, { padding: [28, 28], maxZoom: 9 });
      setTimeout(() => leafletMap && leafletMap.invalidateSize(), 80);
    }

    function renderDetail() {
      const w = wars.find(x => x.id === selectedId) || wars[0];
      detailEl.innerHTML = `
        <h2>${w.title}</h2>
        <div class="scripture">${w.ref}</div>
        <p class="summary">${w.summary}</p>
        <div class="grid">
          <div class="info"><b>時期</b>${w.time}</div>
          <div class="info"><b>地點</b>${w.place}</div>
          <div class="info"><b>主要人物</b>${w.people}</div>
        </div>
        <section class="flow">
          <h3>戰爭流程</h3>
          <div class="steps">
            ${w.steps.map((s, i) => `
              <div class="step">
                <div class="num">${i + 1}</div>
                <div><div class="step-title">${s[0]}</div><div class="step-body">${s[1]}</div></div>
              </div>
            `).join('')}
          </div>
        </section>
        <section class="lessons">
          <h3>重要信仰功課</h3>
          <div class="chips">${w.lessons.map(l => `<span class="chip">${l}</span>`).join('')}</div>
        </section>
        ${renderMap(w.id)}
        <div class="map">閱讀建議：先讀完整章節，再對照「背景 → 危機 → 神的話／介入 → 行動 → 結果 → 屬靈功課」六個層次觀察。</div>
      `;
      updateLeafletMap(w.id);
    }

    function render() { renderList(); renderDetail(); }
    searchEl.addEventListener('input', render);
    periodEl.addEventListener('change', render);
    resetEl.addEventListener('click', () => { searchEl.value = ''; periodEl.value = 'all'; selectedId = wars[0].id; render(); });
    render();
  </script>
</body>
</html>
